services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '4173:80'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/neytr
      CLIENT_URL: http://localhost:4173
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      COOKIE_SECRET: change-me-too
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/v1/auth/google/callback
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
